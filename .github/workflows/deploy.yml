# Deploy iam-service a producción
# Push a main/master → build → push DOCR → deploy vía SSH
# Requiere: deployment iam-service aplicado en K8s, secrets DOCR_TOKEN, SSH_PRIVATE_KEY, DROPLET_IP
#
# ⚠️ Drift: kubectl set image modifica el deployment en vivo pero NO el YAML del repo.

name: Deploy iam-service to Production

on:
  push:
    branches: [main, master]

env:
  REGISTRY: registry.digitalocean.com/mc-bootstrap-registry
  IMAGE_NAME: iam-service
  DEPLOYMENT_NAME: iam-service
  CONTAINER_NAME: iam
  NAMESPACE: default

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DigitalOcean Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DOCR_TOKEN }}
          password: ${{ secrets.DOCR_TOKEN }}

      - name: Build and Push Image (linux/amd64)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --target production \
            --provenance=false \
            --sbom=false \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --push \
            .

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          if echo "$SSH_PRIVATE_KEY" | grep -q '^-----BEGIN'; then
            echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DROPLET_IP >> ~/.ssh/known_hosts 2>/dev/null || true
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}

      - name: Deploy to K8s
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} \
               ${{ env.CONTAINER_NAME }}=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
               -n ${{ env.NAMESPACE }} && \
             kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} \
               -n ${{ env.NAMESPACE }} --timeout=180s"

      - name: Verify Pod Ready
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy@${{ secrets.DROPLET_IP }} \
            "export KUBECONFIG=/home/deploy/.kube/config && \
             READY=\$(kubectl get pods -l app=iam-service -o jsonpath='{.items[0].status.containerStatuses[0].ready}') && \
             IMAGE=\$(kubectl get pods -l app=iam-service -o jsonpath='{.items[0].spec.containers[0].image}') && \
             echo \"Pod ready: \$READY\" && echo \"Image: \$IMAGE\" && \
             [ \"\$READY\" = 'true' ] || (echo '❌ Pod not ready'; exit 1) && \
             echo '✅ iam-service is running and healthy'"