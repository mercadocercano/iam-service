openapi: 3.1.0
info:
  title: Multi-Tenant IAM API
  version: 1.0.0
  description: API para gestión de identidad y acceso multi-tenant

servers:
  - url: /iam/api/v1
    description: Base URL para la API v1

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - provider
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
        google_token:
          type: string
        tenant_id:
          type: string
          format: uuid

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
        user:
          $ref: '#/components/schemas/User'

    Plan:
      type: object
      properties:
        id:
          type: string
          format: uuid
        saas:
          type: string
          enum: [ALL]
        name:
          type: string
        description:
          type: string
        features:
          type: array
          items:
            type: string
        monthly_price:
          type: number
        yearly_price:
          type: number
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tenant:
      type: object
      required:
        - name
        - plan_id
        - email_user_key
      properties:
        id:
          type: string
          format: uuid
        saas:
          type: string
        name:
          type: string
        plan_id:
          type: string
          format: uuid
        email_user_key:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        plan:
          $ref: '#/components/schemas/Plan'
        users:
          type: array
          items:
            $ref: '#/components/schemas/User'

    User:
      type: object
      required:
        - email
        - tenant_id
        - role_id
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        tenant_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, ACTIVE]
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
        federated_id:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Role:
      type: object
      required:
        - name
        - saas
      properties:
        id:
          type: string
          format: uuid
        saas:
          type: string
          enum: [CRM, ERP, ECOMMERCE]
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

paths:
  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/refresh:
    post:
      summary: Refrescar token de acceso
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refrescado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

  /auth/logout:
    post:
      summary: Cerrar sesión
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Sesión cerrada exitosamente

  /plans:
    get:
      summary: Obtener todos los planes
      tags: [Plans]
      responses:
        '200':
          description: Lista de planes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Plan'

    post:
      summary: Crear nuevo plan
      tags: [Plans]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plan'
      responses:
        '201':
          description: Plan creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

  /plans/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Obtener plan por ID
      tags: [Plans]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Plan encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

    put:
      summary: Actualizar plan
      tags: [Plans]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Plan'
      responses:
        '200':
          description: Plan actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Plan'

    delete:
      summary: Eliminar plan
      tags: [Plans]
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Plan eliminado

  /tenants:
    post:
      summary: Crear nuevo tenant
      tags: [Tenants]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tenant'
      responses:
        '201':
          description: Tenant creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

    get:
      summary: Obtener todos los tenants
      tags: [Tenants]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tenant'

  /tenants/by-email-key:
    get:
      summary: Obtener tenant por email key
      tags: [Tenants]
      parameters:
        - name: email_key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tenant encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

  /tenants/{id}:
    get:
      summary: Obtener tenant por ID
      tags: [Tenants]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Tenant encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

    put:
      summary: Actualizar tenant
      tags: [Tenants]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tenant'
      responses:
        '200':
          description: Tenant actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'

    delete:
      summary: Eliminar tenant
      tags: [Tenants]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Tenant eliminado

  /users:
    post:
      summary: Crear nuevo usuario
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/by-email:
    get:
      summary: Obtener usuario por email
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/by-tenant/{tenant_id}:
    get:
      summary: Obtener usuarios por tenant
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: tenant_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      summary: Obtener usuario por ID
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

    delete:
      summary: Eliminar usuario
      tags: [Users]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Usuario eliminado

  /roles:
    post:
      summary: Crear nuevo rol
      tags: [Roles]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
        '201':
          description: Rol creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

    get:
      summary: Obtener todos los roles
      tags: [Roles]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

  /roles/by-saas:
    get:
      summary: Obtener roles por SaaS
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - name: saas
          in: query
          required: true
          schema:
            type: string
            enum: [CRM, ERP, ECOMMERCE]
      responses:
        '200':
          description: Lista de roles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Role'

  /roles/by-name:
    get:
      summary: Obtener rol por nombre
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rol encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /roles/{id}:
    get:
      summary: Obtener rol por ID
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Rol encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

    put:
      summary: Actualizar rol
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Role'
      responses:
        '200':
          description: Rol actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

    delete:
      summary: Eliminar rol
      tags: [Roles]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Rol eliminado
