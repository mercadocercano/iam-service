version: '3.8'

# Docker Compose para IAM Service independiente
# Usa la misma red y configuración que el docker-compose.infra.yml principal

services:
  # PostgreSQL (referencia al servicio principal)
  postgres:
    image: postgres:15-alpine
    container_name: tv-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - saas-network

  # IAM Service
  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tv-iam-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: iam_db
      DB_SSLMODE: disable
      GIN_MODE: debug
      LOG_LEVEL: debug
      JWT_SECRET: dev-secret-key-123
      PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - iam_go_mod_cache:/go/pkg/mod
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - saas-network
    labels:
      - "dev.service=iam"

volumes:
  postgres_data:
    driver: local
  iam_go_mod_cache:
    driver: local

networks:
  saas-network:
    driver: bridge
